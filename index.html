<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Airdrop</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1518791841217-8f162f1e1131?auto=format&fit=crop&w=1470&q=80");
background-size:cover;
}

.container{
max-width:850px;
margin:50px auto;
background:rgba(0,0,0,.75);
padding:50px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

h1{
font-size:55px;
color:#f5a623;
margin-bottom:10px;
}

.subtitle{
color:#ddd;
margin-bottom:40px;
}

button{
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin:10px;
}

.twitter{
background:#1DA1F2;
color:white;
}

.submit{
background:#f5a623;
color:black;
}

input{
padding:15px;
border-radius:10px;
border:none;
font-size:18px;
width:90%;
max-width:420px;
}

.tap-container{
width:170px;
margin:30px auto;
}

#tap-item{
width:100%;
cursor:pointer;
transition:transform .15s;
}

#tap-item:active{
transform:scale(.9);
}

#tap-msg{
color:lime;
font-weight:bold;
min-height:24px;
margin-top:10px;
}

.coin-counter{
font-size:22px;
margin-top:15px;
}

@media(max-width:600px){

.container{
padding:35px;
margin:30px 15px;
}

h1{
font-size:40px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Tap Airdrop</h1>
<p class="subtitle">Complete tasks and tap to earn rewards</p>

<h2>Step 1 Tasks</h2>

<button class="twitter" id="t1">Follow Twitter</button>
<button class="twitter" id="t2">Join Telegram</button>
<button class="twitter" id="t3">Like & Share</button>

<p id="tasks-done" style="display:none;color:lime;">✅ Tasks Completed</p>

<h2>Step 2 Wallet</h2>

<form id="wallet-form">

<input id="wallet-input" placeholder="Enter wallet address" required>
<br><br>

<button class="submit">Submit Wallet</button>

</form>

<p class="coin-counter">
Reward: <span id="coin-count">0</span>
</p>

<h2>Step 3 Tap</h2>

<div class="tap-container">

<!-- GANTI GAMBAR UNTUK TEMA -->

<img id="tap-item" src="https://i.ibb.co/YZ4R8Yy/wolf-coin.png">

</div>

<p id="tap-msg"></p>

</div>

<script>

/* TASK SYSTEM */

let tasks=[false,false,false]

function completeTask(i){

tasks[i]=true

if(tasks.every(v=>v))
tasksDone.style.display="block"

}

t1.onclick=()=>completeTask(0)
t2.onclick=()=>completeTask(1)
t3.onclick=()=>completeTask(2)

/* STORAGE */

let walletDB=JSON.parse(localStorage.getItem("walletDB")||"{}")

function update(wallet){

if(walletDB[wallet])
coinCount.innerText=walletDB[wallet].coins
else
coinCount.innerText=0

}

/* WALLET SUBMIT */

walletForm.addEventListener("submit",e=>{

e.preventDefault()

let wallet=walletInput.value.trim()

if(!tasks.every(v=>v)){
alert("Complete tasks first")
return
}

if(!walletDB[wallet]){

walletDB[wallet]={coins:0}

localStorage.setItem("walletDB",JSON.stringify(walletDB))

alert("Wallet registered")

}

update(wallet)

})

/* TAP GAME */

tapItem.onclick=()=>{

let wallet=walletInput.value.trim()

if(!walletDB[wallet]){

tapMsg.innerText="Submit wallet first"
return

}

if(walletDB[wallet].coins>=1000){

tapMsg.innerText="Max reward reached"
return

}

let add=walletDB[wallet].coins==0?5:10

if(walletDB[wallet].coins+add>1000)
add=1000-walletDB[wallet].coins

walletDB[wallet].coins+=add

localStorage.setItem("walletDB",JSON.stringify(walletDB))

update(wallet)

tapMsg.innerText="+"+add+" reward"

let x=Math.random()*50-25
let y=Math.random()*50-25

tapItem.style.transform=`translate(${x}px,${y}px) scale(.9)`

setTimeout(()=>{
tapItem.style.transform="translate(0,0) scale(1)"
},120)

}

</script>

</body>
</html>
