<script>
document.addEventListener("DOMContentLoaded", () => {

(() => {
"use strict";

const REWARD = 1000;
const GOOGLE_FORM_URL = "https://forms.gle/QZGCeAHsLZY52Smt8";
const COIN_TARGET = 1000;
const COIN_PER_TAP = 5;
const TWEET_ID = "2031240023883059391";

const el = id => document.getElementById(id);

const elements = {
connectWalletBtn: el("connectWalletBtn"),
walletStatus: el("walletStatus"),
likeBtn: el("likeBtn"),
rtBtn: el("rtBtn"),
commentBtn: el("commentBtn"),
verifyBtn: el("verifyBtn"),
submitBtn: el("submitBtn"),
statusMsg: el("statusMsg"),
rewardMsg: el("rewardMsg"),
tapGameStep: el("tapGameStep"),
gameArea: el("gameArea"),
wolfCoin: el("wolfCoin"),
gameInfo: el("gameInfo"),
coinCount: el("coinCount"),
coinTarget: el("coinTarget"),
tapValue: el("tapValue"),
progressBar: el("progressBar")
};

let isVerifying = false;
let isSubmitting = false;
let currentWallet = "";
let gameRunning = false;
let moveTimer = null;

if(elements.coinTarget) elements.coinTarget.textContent = COIN_TARGET;
if(elements.tapValue) elements.tapValue.textContent = COIN_PER_TAP;

function getPhantomProvider(){
const provider = window.phantom?.solana || window.solana;
if(provider?.isPhantom) return provider;
return null;
}

function shortWallet(wallet){
if(!wallet) return "";
return wallet.slice(0,4)+"..."+wallet.slice(-4);
}

function getUserKey(wallet){
return `wolf_user_${wallet}`;
}

function getDefaultStatus(){
return {like:false,retweet:false,comment:false,tapCoins:0,tapGameDone:false,wallet:false};
}

function safeParseJSON(v,fallback){
try{
const p = JSON.parse(v);
return p && typeof p==="object" ? p : fallback;
}catch{
return fallback;
}
}

function getStatus(){
if(!currentWallet) return getDefaultStatus();
const raw = localStorage.getItem(getUserKey(currentWallet));
return safeParseJSON(raw,getDefaultStatus());
}

function saveStatus(status){
if(!currentWallet) return;

localStorage.setItem(
getUserKey(currentWallet),
JSON.stringify({
like:!!status.like,
retweet:!!status.retweet,
comment:!!status.comment,
tapCoins:Math.max(0,Number(status.tapCoins)||0),
tapGameDone:!!status.tapGameDone,
wallet:!!status.wallet
})
);
}

function updateGameUI(){

if(!elements.coinCount || !elements.progressBar) return;

const status = getStatus();
const coins = Math.min(status.tapCoins||0,COIN_TARGET);

elements.coinCount.textContent = coins;
elements.progressBar.style.width = ((coins/COIN_TARGET)*100)+"%";

}

function moveWolf(){

if(!elements.gameArea || !elements.wolfCoin) return;

const area = elements.gameArea;
const wolf = elements.wolfCoin;

const maxX = Math.max(area.clientWidth - wolf.offsetWidth - 8,0);
const maxY = Math.max(area.clientHeight - wolf.offsetHeight - 8,0);

wolf.style.left = Math.random()*maxX+"px";
wolf.style.top = Math.random()*maxY+"px";

}

function stopGame(){
gameRunning=false;
if(moveTimer) clearInterval(moveTimer);
}

function startGame(){

const status = getStatus();

if(gameRunning || status.tapGameDone) return;

gameRunning=true;

moveWolf();

moveTimer=setInterval(moveWolf,650);

}

function handleWolfTap(){

const status = getStatus();

if(!(status.like && status.retweet && status.comment)) return;

if(status.tapGameDone) return;

status.tapCoins = Math.min((status.tapCoins||0)+COIN_PER_TAP,COIN_TARGET);

if(status.tapCoins>=COIN_TARGET){
status.tapCoins=COIN_TARGET;
status.tapGameDone=true;
stopGame();
}

saveStatus(status);

updateGameUI();

moveWolf();

}

async function connectPhantom(){

const provider=getPhantomProvider();

if(!provider) return;

const res = await provider.connect();

currentWallet = res.publicKey.toString();

if(elements.walletStatus){
elements.walletStatus.textContent="Connected: "+shortWallet(currentWallet);
}

updateGameUI();

}

function updateButtons(){

const status = getStatus();

if(elements.likeBtn) elements.likeBtn.classList.toggle("done",status.like);
if(elements.rtBtn) elements.rtBtn.classList.toggle("done",status.retweet);
if(elements.commentBtn) elements.commentBtn.classList.toggle("done",status.comment);

const step1Done = status.like && status.retweet && status.comment;

if(step1Done && !status.tapGameDone){
startGame();
}else{
stopGame();
}

}

async function verifyActions(){

if(isVerifying) return;

isVerifying=true;

const likeDone = confirm("Have you liked the tweet?");
if(!likeDone){isVerifying=false;return;}

const rtDone = confirm("Have you retweeted the tweet?");
if(!rtDone){isVerifying=false;return;}

const commentDone = confirm("Have you commented?");

const status = getStatus();

status.like=true;
status.retweet=true;
status.comment=commentDone;

saveStatus(status);

updateButtons();

isVerifying=false;

}

async function submitWallet(){

if(!(await connectPhantom())) return;

const status = getStatus();

if(!status.tapGameDone) return;

window.location.href =
GOOGLE_FORM_URL +
"?wallet="+encodeURIComponent(currentWallet)+
"&tweet="+encodeURIComponent(TWEET_ID);

}

if(elements.connectWalletBtn){
elements.connectWalletBtn.addEventListener("click",connectPhantom);
}

if(elements.verifyBtn){
elements.verifyBtn.addEventListener("click",verifyActions);
}

if(elements.submitBtn){
elements.submitBtn.addEventListener("click",submitWallet);
}

if(elements.wolfCoin){
elements.wolfCoin.addEventListener("click",handleWolfTap);
elements.wolfCoin.addEventListener("touchstart",handleWolfTap,{passive:true});
}

connectPhantom().catch(()=>{});

updateButtons();
updateGameUI();

})();

});
</script>
