<script>
let done = [false,false,false];

// Step click handler
function markDone(i){
  done[i] = true;
  if(done.every(v => v)) document.getElementById("all-done").style.display = "block";
}

document.getElementById("post1").addEventListener("click", ()=>markDone(0));
document.getElementById("post2").addEventListener("click", ()=>markDone(1));
document.getElementById("post3").addEventListener("click", ()=>markDone(2));

// Anti-spam wallet submit
document.getElementById("gform").addEventListener("submit", function(e){
  const walletInput = document.getElementById("wallet-input").value.trim();

  // Cek Step 1 selesai
  if(!done.every(v => v)){
    e.preventDefault();
    alert("Please complete Step 1 first!");
    return;
  }

  // Ambil daftar wallet yang sudah submit dari localStorage
  let submittedWallets = JSON.parse(localStorage.getItem("submittedWallets") || "[]");

  if(submittedWallets.includes(walletInput)){
    e.preventDefault();
    alert("This wallet has already been submitted! ❌");
    return;
  }

  // Simpan wallet baru ke localStorage
  submittedWallets.push(walletInput);
  localStorage.setItem("submittedWallets", JSON.stringify(submittedWallets));

  // Tampilkan pesan berhasil submit
  document.getElementById("submitted-msg").style.display = "block";
});
</script>
