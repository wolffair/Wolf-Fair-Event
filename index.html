<script>
(() => {

const REWARD = 1000
const GOOGLE_FORM_URL = "https://forms.gle/QZGCeAHsLZY52Smt8"
const COIN_TARGET = 1000
const COIN_PER_TAP = 5

const elements = {
likeBtn: document.getElementById("likeBtn"),
rtBtn: document.getElementById("rtBtn"),
commentBtn: document.getElementById("commentBtn"),
verifyBtn: document.getElementById("verifyBtn"),
submitBtn: document.getElementById("submitBtn"),
statusMsg: document.getElementById("statusMsg"),
rewardMsg: document.getElementById("rewardMsg"),
tapGameStep: document.getElementById("tapGameStep"),
gameArea: document.getElementById("gameArea"),
wolfCoin: document.getElementById("wolfCoin"),
gameInfo: document.getElementById("gameInfo"),
coinCount: document.getElementById("coinCount"),
coinTarget: document.getElementById("coinTarget"),
tapValue: document.getElementById("tapValue"),
progressBar: document.getElementById("progressBar")
}

let gameRunning=false
let moveTimer=null
let lastTap=0

elements.coinTarget.textContent = COIN_TARGET
elements.tapValue.textContent = COIN_PER_TAP

function getStatus(){
return JSON.parse(localStorage.getItem("wolf_user") ||
'{"like":false,"retweet":false,"comment":false,"tapCoins":0,"tapGameDone":false}')
}

function saveStatus(s){
localStorage.setItem("wolf_user",JSON.stringify(s))
}

function updateGameUI(){

const s = getStatus()

elements.coinCount.textContent = s.tapCoins

const progress = (s.tapCoins / COIN_TARGET) * 100
elements.progressBar.style.width = progress + "%"

if(s.tapGameDone){

elements.gameInfo.textContent = "✅ Game completed. Submit reward."

}else if(s.like && s.retweet && s.comment){

elements.gameInfo.textContent = "Tap the running WOLF"

}else{

elements.gameInfo.textContent = "🔒 Complete Step 1 first"

}

}

function moveWolf(){

const area = elements.gameArea
const wolf = elements.wolfCoin

const maxX = area.clientWidth - wolf.offsetWidth
const maxY = area.clientHeight - wolf.offsetHeight

wolf.style.left = Math.random()*maxX+"px"
wolf.style.top = Math.random()*maxY+"px"

}

function startGame(){

const s = getStatus()

if(gameRunning || s.tapGameDone) return

gameRunning = true
moveWolf()

moveTimer = setInterval(moveWolf,700)

}

function stopGame(){

gameRunning=false

if(moveTimer){
clearInterval(moveTimer)
moveTimer=null
}

}

function createCoinEffect(x,y){

const coin=document.createElement("div")
coin.innerText="+5"
coin.style.position="absolute"
coin.style.color="#22c55e"
coin.style.fontWeight="bold"
coin.style.pointerEvents="none"
coin.style.left=x+"px"
coin.style.top=y+"px"
coin.style.animation="coinFloat 0.8s ease-out forwards"

elements.gameArea.appendChild(coin)

setTimeout(()=>coin.remove(),800)

}

function handleWolfTap(e){

const s = getStatus()

if(!(s.like && s.retweet && s.comment)){

elements.statusMsg.textContent="Complete Like Retweet Comment first"
elements.statusMsg.style.color="red"
return

}

if(s.tapGameDone) return

const now=Date.now()

if(now-lastTap < 80) return
lastTap=now

const rect = elements.gameArea.getBoundingClientRect()

createCoinEffect(
e.clientX - rect.left,
e.clientY - rect.top
)

s.tapCoins += COIN_PER_TAP

if(s.tapCoins >= COIN_TARGET){

s.tapCoins = COIN_TARGET
s.tapGameDone = true

saveStatus(s)

stopGame()

updateButtons()

elements.statusMsg.textContent="🎉 Game completed!"

return
}

saveStatus(s)

updateGameUI()

moveWolf()

}

function updateButtons(){

const s = getStatus()

elements.likeBtn.classList.toggle("done",s.like)
elements.rtBtn.classList.toggle("done",s.retweet)
elements.commentBtn.classList.toggle("done",s.comment)

const step1Done = s.like && s.retweet && s.comment

elements.tapGameStep.style.display="block"

if(!step1Done){

elements.wolfCoin.style.opacity="0.35"
elements.wolfCoin.style.filter="grayscale(1)"
elements.wolfCoin.style.cursor="not-allowed"

}else{

elements.wolfCoin.style.opacity="1"
elements.wolfCoin.style.filter="none"
elements.wolfCoin.style.cursor="pointer"

startGame()

}

updateGameUI()

}

function verifyActions(){

const like = confirm("Did you Like the post?")
if(!like) return

const rt = confirm("Did you Retweet?")
if(!rt) return

const comment = confirm("Did you Comment?")
if(!comment) return

const s = getStatus()

s.like=true
s.retweet=true
s.comment=true

saveStatus(s)

elements.statusMsg.textContent="Actions verified"

updateButtons()

}

function submitWallet(){

const s = getStatus()

if(!s.tapGameDone){

elements.rewardMsg.textContent="Finish game first"
elements.rewardMsg.style.color="red"
return

}

elements.rewardMsg.textContent="🎉 Reward ready. Fill the form"

window.open(GOOGLE_FORM_URL,"_blank")

}

elements.verifyBtn.onclick = verifyActions
elements.submitBtn.onclick = submitWallet
elements.wolfCoin.addEventListener("click",handleWolfTap)

updateButtons()

})()
</script>
