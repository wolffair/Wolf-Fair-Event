<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf Fair</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

.container{
max-width:700px;
margin:50px auto;
padding:40px;
background:#1e293b;
border-radius:20px;
}

h1{
color:#facc15;
}

button{
background:#facc15;
border:none;
padding:12px 24px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#fde047;
}

.progress{
background:#334155;
height:20px;
border-radius:20px;
margin-top:10px;
}

.progress-bar{
background:#facc15;
height:20px;
width:0%;
border-radius:20px;
}

.section{
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>🐺 Wolf Fair Early Pack</h1>

<p>Join the wolves and earn Wolf Coin.</p>

<div class="section">

<h2>Your Wolf Coin</h2>

<h3 id="coin">0</h3>

<button onclick="claim()">Claim Wolf Coin</button>

</div>

<div class="section">

<h2>Pack Progress</h2>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<p id="progressText">0 / 100 Wolves</p>

</div>

</div>

<script>

let coin = localStorage.getItem("wolfCoin");
let wolves = localStorage.getItem("wolves");

if(coin === null){coin = 0}else{coin = parseInt(coin)}
if(wolves === null){wolves = 0}else{wolves = parseInt(wolves)}

update()

function claim(){

coin += 10
wolves += 1

localStorage.setItem("wolfCoin",coin)
localStorage.setItem("wolves",wolves)

update()

}

function update(){

document.getElementById("coin").innerHTML = coin

let percent = wolves

if(percent > 100){percent = 100}

document.getElementById("bar").style.width = percent + "%"

document.getElementById("progressText").innerHTML = wolves + " / 100 Wolves"

}

</script>

</body>
</html>
